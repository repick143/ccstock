# ==========================================
# ccstock 全局配置
# 修改后直接生效，无需重新安装
# ==========================================

[database]
# MySQL 连接参数
host     = "127.0.0.1"
port     = 3306
user     = "root"
password = "1234"
database = "ccstock"

[mootdx]
# 通达信行情服务器参数
market = "std"    # std=标准行情, ext=扩展行情
timeout = 8       # 连接超时秒数

[etl]
# 数据拉取默认参数
default_years = 2    # 默认获取最近 N 年日线数据
